<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Expansivo</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#172554">
  <link id="favicon" rel="icon" type="image/png" href="/icon-512.png" />
  <script>
    (function () {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        console.log('Favicon image loaded successfully');
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 128, 128);

        // Manter proporção original no desenho do canvas (favicons)
        const aspect = img.width / img.height;
        let dw = 110, dh = 110;
        if (aspect > 1) { // Larga
          dh = 110 / aspect;
        } else { // Alta
          dw = 110 * aspect;
        }

        ctx.translate(64, 64);
        ctx.rotate(7 * Math.PI / 180);
        ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);

        const newLink = document.createElement('link');
        newLink.rel = 'icon';
        newLink.id = 'favicon';
        newLink.type = 'image/png';
        newLink.href = canvas.toDataURL('image/png');

        const head = document.getElementsByTagName('head')[0];
        const oldLinks = document.querySelectorAll('link[rel*="icon"]');
        oldLinks.forEach(link => head.removeChild(link));
        head.appendChild(newLink);
        console.log('Favicon properly aspect-ratio scaled and injected');
      };
      img.onerror = function () {
        console.error('Failed to load favicon image');
      };
      img.src = '/icon-512.png';
    })();
  </script>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }

    @keyframes progress-indeterminate {
      0% {
        transform: translateX(-100%);
        width: 30%;
      }

      50% {
        transform: translateX(100%);
        width: 60%;
      }

      100% {
        transform: translateX(300%);
        width: 30%;
      }
    }

    .animate-progress-indeterminate {
      animation: progress-indeterminate 2s infinite linear;
      transform-origin: left;
    }

    /* Scrollbar-hide utility */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
